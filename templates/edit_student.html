{% extends 'base.html' %}

{% block title %}Edit Student - StudentMS{% endblock %}

{% block content %}
  <h1>Edit Student</h1>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ student.email }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Course</label>
      <input type="text" name="course" class="form-control" value="{{ student.course or '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Year</label>
      <input type="number" name="year" class="form-control" value="{{ student.year if student.year is not none else '' }}">
    </div>
    <button class="btn btn-primary">Save</button>
    <a href="{{ url_for('list_students') }}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
