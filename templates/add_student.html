{% extends 'base.html' %}

{% block title %}Add Student - StudentMS{% endblock %}

{% block content %}
  <h1>Add Student</h1>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" value="{{ form.name if form else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ form.email if form else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Course</label>
      <input type="text" name="course" class="form-control" value="{{ form.course if form else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Year</label>
      <input type="number" name="year" class="form-control" value="{{ form.year if form else '' }}">
    </div>
    <button class="btn btn-primary">Add Student</button>
    <a href="{{ url_for('list_students') }}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
