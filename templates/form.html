{% extends 'base.html' %}
{% block title %}{{ action }} Student{% endblock %}

{% block content %}
  <h1>{{ action }} Student</h1>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" value="{{ student.name if student else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" value="{{ student.email if student else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Course</label>
      <input type="text" name="course" class="form-control" value="{{ student.course if student else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Year</label>
      <input type="number" name="year" class="form-control" value="{{ student.year if student and student.year is not none else '' }}">
    </div>
    <button class="btn btn-primary">{{ action }}</button>
    <a href="{{ url_for('index') }}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
